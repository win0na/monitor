<!DOCTYPE html>
<html lang="en" style="background:#0a0b0d">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stream Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- LEFT COLUMN: preview + header + stats -->
<div class="left-col">

  <!-- Stream Preview (YouTube embed or offline placeholder) -->
  <div class="preview" id="preview">
    <div class="preview-offline" id="preview-offline">
      <div class="preview-offline-icon">&#9654;</div>
      <div class="preview-offline-txt">Not live</div>
    </div>
  </div>

  <!-- Status Header (OBS + YouTube connection indicators) -->
  <div class="hdr">
    <div class="badge">
      <div class="dot" id="yt-dot"></div>
      <span class="badge-txt" id="yt-status" data-label="YT —"></span>
    </div>
    <div class="badge">
      <div class="dot" id="obs-dot"></div>
      <span class="badge-txt" id="obs-status" data-label="OBS —"></span>
    </div>
  </div>

  <!-- Stats Grid (viewers, duration, bitrate, CPU, GPU, FPS) -->
  <div class="stats">
    <div class="stat yt-stat" id="c-viewers">
      <div class="sl"></div>
      <div class="sv-row"><span class="sv" id="v-viewers">&mdash;</span></div>
    </div>
    <div class="stat yt-stat" id="c-dur">
      <div class="sl"></div>
      <div class="sv-row dur-row">
        <span class="sv" id="dur-h" style="display:none"></span><span class="su su-inline" id="dur-hu" style="display:none">h</span>
        <span class="sv" id="dur-m">&mdash;</span><span class="su su-inline dur-su-m">m</span>
        <span class="sv dur-su-s" id="dur-s"></span><span class="su su-inline dur-su-s">s</span>
      </div>
    </div>
    <div class="stat obs-stat" id="c-bit">
      <div class="sl"></div>
      <div class="sv-row">
        <span class="sv" id="v-bit">&mdash;</span>
      </div>
      <div class="bbar-wrap" id="bbar-wrap" style="display:none"><div class="bbar" id="bbar"></div></div>
    </div>
    <div class="stat obs-stat" id="c-cpu">
      <div class="sl"></div>
      <div class="sv-row">
        <span class="sv" id="v-cpu">&mdash;</span>
        <span class="su su-inline">%</span>
      </div>
    </div>
    <div class="stat obs-stat" id="c-gpu">
      <div class="sl"></div>
      <div class="sv-row">
        <span class="sv" id="v-gpu">&mdash;</span>
        <span class="su su-inline">%</span>
      </div>
    </div>
    <div class="stat obs-stat" id="c-fps">
      <div class="sl"></div>
      <div class="sv-row">
        <span class="sv" id="v-fps">&mdash;</span>
        <span class="su su-inline">fps</span>
      </div>
    </div>
  </div>

</div><!-- /left-col -->

<!-- RIGHT COLUMN: chat -->
<div class="right-col">
  <div class="chat-wrap">
    <div class="chat-hdr">
      <div class="chat-hdr-left">
        <span class="chat-hdr-label" data-label="Live Chat"></span>
      </div>
      <div class="chat-hdr-right">
        <span class="chat-count" id="chat-count"></span>
      </div>
    </div>
    <div class="chat-err" id="chat-err" style="display:none"></div>
    <div class="chat-feed" id="chat-feed">
      <div class="chat-empty" id="chat-empty">Waiting for chat...</div>
    </div>
    <div class="chat-reconnect" id="chat-reconnect">
      <div class="chat-reconnect-card">
        <span class="chat-reconnect-dot"></span>
        <span class="chat-reconnect-label">Reconnecting</span>
      </div>
    </div>
  </div>
</div><!-- /right-col -->

<script src="/js/app.js"></script>
</body>
</html>
